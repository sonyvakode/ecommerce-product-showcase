<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONYVAKODESHOPCARD - Online Shopping</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Cart Modal -->
    <!-- (ALL YOUR EXISTING CODE REMAINS SAME - NO CHANGE) -->

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="#home" class="nav-item active">
            <span>🏠</span>
            <span>Home</span>
        </a>
        <a href="#categories" class="nav-item">
            <span>📱</span>
            <span>Categories</span>
        </a>
        <a href="#account" class="nav-item" onclick="showLogin()">
            <span>👤</span>
            <span>Account</span>
        </a>
        <a href="#cart" class="nav-item" onclick="viewCart()">
            <span>🛒</span>
            <span>Cart</span>
        </a>
    </nav>

    <!-- ================= FINANCE DASHBOARD (ADDED) ================= -->

    <div style="padding:20px; background:#f8f8f8; margin-top:20px;">
        <h2>💰 Finance Dashboard</h2>

        <input type="number" id="f_amount" placeholder="Amount">
        <input type="text" id="f_category" placeholder="Category">

        <select id="f_type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <button onclick="addFinanceRecord()">Add Record</button>

        <h3>Records</h3>
        <div id="finance_records"></div>

        <h3>Summary</h3>
        <div id="finance_summary"></div>
    </div>

    <!-- ================= SCRIPTS ================= -->

    <script src="js/script.js"></script>
    <script src="js/finance.js"></script>

</body>
</html>
